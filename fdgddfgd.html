<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Beni seviyor musun?</title>
<style>
  :root {
    --bg-1: #fff5f7;
    --bg-2: #ffe3ec;
    --blush: #ffb3c6;
    --rose: #ff7396;
    --red:  #ff4d6d;
    --deep: #c9184a;
    --ink:  #5a2330;
    --white: #fffafc;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; margin: 0; }

  body {
    font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", sans-serif;
    color: var(--ink);
    background: radial-gradient(circle at 50% -10%, var(--bg-2), var(--bg-1) 60%);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    text-align: center;
    padding: 24px;
  }

  /* Arka plandaki uçuşan kalpler */
  .floaty {
    position: fixed;
    bottom: -40px;
    font-size: 22px;
    opacity: 0;
    animation: rise linear infinite;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(.6) rotate(0deg);   opacity: 0; }
    15%  { opacity: .7; }
    100% { transform: translateY(-110vh) scale(1) rotate(40deg); opacity: 0; }
  }

  .screen {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    animation: fadeIn .6s ease both;
  }
  .screen.hidden { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Atan kalp (CSS ile çizildi) */
  .heart {
    width: 92px;
    height: 92px;
    margin: 0 auto 28px;
    position: relative;
    transform: rotate(-45deg);
    animation: beat 1.1s ease-in-out infinite;
    filter: drop-shadow(0 10px 22px rgba(255,77,109,.35));
  }
  .heart, .heart::before, .heart::after {
    background: linear-gradient(135deg, var(--rose), var(--red));
    border-radius: 6px;
  }
  .heart::before, .heart::after {
    content: "";
    width: 92px;
    height: 92px;
    position: absolute;
    border-radius: 50%;
  }
  .heart::before { top: -46px; left: 0; }
  .heart::after  { left: 46px; top: 0; }

  @keyframes beat {
    0%, 100% { transform: rotate(-45deg) scale(1); }
    25%      { transform: rotate(-45deg) scale(1.12); }
    40%      { transform: rotate(-45deg) scale(.97); }
    60%      { transform: rotate(-45deg) scale(1.06); }
  }

  h1 {
    font-size: clamp(1.7rem, 6vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -.5px;
    margin: 0 0 8px;
    color: var(--deep);
  }
  .sub {
    margin: 0 0 32px;
    font-size: 1rem;
    color: var(--rose);
  }

  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    font: inherit;
    font-weight: 700;
    border: none;
    cursor: pointer;
    border-radius: 999px;
    padding: 15px 38px;
    font-size: 1.05rem;
    transition: transform .15s ease, box-shadow .2s ease;
  }
  button:focus-visible {
    outline: 3px solid var(--deep);
    outline-offset: 3px;
  }

  .yes {
    background: linear-gradient(135deg, var(--red), var(--deep));
    color: var(--white);
    box-shadow: 0 10px 24px rgba(201,24,74,.35);
  }
  .yes:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(201,24,74,.45); }
  .yes:active { transform: translateY(0) scale(.97); }

  .no {
    background: var(--white);
    color: var(--rose);
    box-shadow: 0 6px 16px rgba(255,115,150,.25);
  }
  /* Hayır butonu kaçtığında sabit konuma geçer */
  .no.runaway {
    position: fixed;
    z-index: 5;
    margin: 0;
    transition: left .25s ease, top .25s ease;
  }

  /* ---- Tebrik ekranı ---- */
  .celebrate h1 { font-size: clamp(1.6rem, 5.5vw, 2.2rem); }
  .photo-frame {
    margin: 26px auto 0;
    width: min(280px, 78vw);
    aspect-ratio: 1 / 1;
    border-radius: 24px;
    padding: 10px;
    background: linear-gradient(135deg, var(--blush), var(--rose));
    box-shadow: 0 16px 40px rgba(255,77,109,.35);
  }
  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    display: block;
    background: var(--bg-2);
  }
  .caption {
    margin-top: 18px;
    font-size: .95rem;
    color: var(--rose);
  }

  @media (prefers-reduced-motion: reduce) {
    .heart, .floaty, .screen { animation: none; }
  }
</style>
</head>
<body>

  <!-- ============ GİRİŞ EKRANI ============ -->
  <section class="screen" id="askScreen">
    <div class="heart" aria-hidden="true"></div>
    <h1>Beni seviyor musun?</h1>
    <p class="sub">Dürüst ol bakalım… 👀</p>
    <div class="buttons">
      <button class="yes" id="yesBtn" type="button">Evet</button>
      <button class="no" id="noBtn" type="button">Hayır</button>
    </div>
  </section>

  <!-- ============ TEBRİK EKRANI ============ -->

  <script>
    /* ---------- Uçuşan arka plan kalpleri ---------- */
    (function spawnHearts() {
      const symbols = ["💕", "💗", "❤️", "💖", "🌸"];
      const count = 14;
      for (let i = 0; i < count; i++) {
        const h = document.createElement("span");
        h.className = "floaty";
        h.textContent = symbols[i % symbols.length];
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = 16 + Math.random() * 22 + "px";
        h.style.animationDuration = 7 + Math.random() * 7 + "s";
        h.style.animationDelay = Math.random() * 8 + "s";
        document.body.appendChild(h);
      }
    })();

    /* ---------- Kaçan "Hayır" butonu ---------- */
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");

    function dodge() {
      noBtn.classList.add("runaway");

      // Sabit konumlu buton ekranın görünür alanına göre konumlanır
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const pad = 14;

      // Butonun sığabileceği güvenli alan (asla ekran dışına taşmaz)
      const maxX = Math.max(pad, vw - w - pad);
      const maxY = Math.max(pad, vh - h - pad);

      // Şu anki konumdan belirgin şekilde uzağa zıplasın
      const cur = noBtn.getBoundingClientRect();
      let x, y, tries = 0;
      do {
        x = pad + Math.random() * (maxX - pad);
        y = pad + Math.random() * (maxY - pad);
        tries++;
      } while (
        tries < 15 &&
        Math.hypot(x - cur.left, y - cur.top) < Math.min(vw, vh) * 0.35
      );

      noBtn.style.left = x + "px";
      noBtn.style.top  = y + "px";

      // Her kaçışta "Evet" butonu biraz daha cazip büyüsün 😄
      const scale = Math.min(1.6, parseFloat(yesBtn.dataset.scale || "1") + 0.06);
      yesBtn.dataset.scale = scale;
      yesBtn.style.transform = "scale(" + scale + ")";
    }

    // Masaüstü: fareyle üzerine gelince kaçsın.
    noBtn.addEventListener("mouseenter", dodge);
    // Mobil/dokunmatik: parmak değer değmez kaçsın (tıklama engellenir, buton ekranda kalır).
    noBtn.addEventListener("touchstart", function (e) { e.preventDefault(); dodge(); }, { passive: false });
    // Klavye/fare ile tıklanırsa da basılmasın, yine kaçsın.
    noBtn.addEventListener("click", function (e) { e.preventDefault(); dodge(); });
    // Ekran döndürülürse/boyut değişirse buton ekran dışında kalmasın
    window.addEventListener("resize", function () {
      if (noBtn.classList.contains("runaway")) dodge();
    });

    /* ---------- "Evet" → tebrik ekranı ---------- */
    yesBtn.addEventListener("click", function () {
      document.getElementById("askScreen").classList.add("hidden");
      document.getElementById("loveScreen").classList.remove("hidden");
      // Kutlama: ekstra kalp yağmuru
      for (let i = 0; i < 24; i++) {
        const h = document.createElement("span");
        h.className = "floaty";
        h.textContent = "💖";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = 18 + Math.random() * 26 + "px";
        h.style.animationDuration = 4 + Math.random() * 4 + "s";
        h.style.animationDelay = Math.random() * 1.5 + "s";
        document.body.appendChild(h);
      }
    });
  </script>
